services:
  - type: web
    name: mariglamour-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mariglamour-db
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
    healthCheckPath: /api/public/servicios

databases:
  - name: mariglamour-db
    plan: free
    databaseName: mariglamour
    user: mariglamour
